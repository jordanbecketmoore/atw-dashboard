name: Docker Image CI

on:
  push:
    tags:
      - "app/v*.*.*"
    branches:
      - main

jobs:

  build-latest:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build, Tag & Publish Latest Image to DockerHub
      uses: dinushchathurya/build-tag-push-action@v1.2.1
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        context: ./
        file: ./Dockerfile
        repoOwner: ${{ secrets.DOCKER_USERNAME }}
        repository: atw-dashboard
        tag: latest

  build:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Resolve image tag
      id: version
      uses: ./.github/actions/resolve-version
    - name: Build, Tag & Publish Image to DockerHub
      uses: dinushchathurya/build-tag-push-action@v1.2.1
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        context: ./
        file: ./Dockerfile
        repoOwner: ${{ secrets.DOCKER_USERNAME }}
        repository:  atw-dashboard
        tag: ${{ steps.version.outputs.version }}
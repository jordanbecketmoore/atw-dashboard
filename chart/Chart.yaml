apiVersion: v2
name: atw-dashboard
description: >
  Live dashboard for a fleet of Archive Team Warriors. Deploys the Go backend
  (Deployment + Service + ConfigMap) and the warriors themselves (one
  StatefulSet per project, fronted by headless cluster-internal Services).
  External exposure uses Gateway API HTTPRoute (optional).
type: application
version: 0.1.0
appVersion: "v0.1.0"
keywords:
  - archiveteam
  - warrior
  - dashboard
home: https://github.com/jordanbmoore/atw-dashboard

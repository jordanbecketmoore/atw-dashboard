{{- if .Values.dashboard.httproute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: atw-dashboard
spec:
  {{- if .Values.dashboard.httproute.hostnames }}
  hostnames:
    {{- range .Values.dashboard.httproute.hostnames }}
    - {{ . }}
    {{- end }}
  {{- end }}
  parentRefs:
  {{- range .Values.dashboard.httproute.parentRefs }}
  - group: {{ .group }}
    kind: {{ .kind }}
    name: {{ .name }}
    namespace: {{ .namespace }}
  {{- end }}
  - backendRefs:
    - group: ""
      kind: Service
      name: atw-dashboard
      port: 80
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: atw-dashboard
  labels:
    app.kubernetes.io/name: atw-dashboard
  annotations:
    # SSE-friendly settings: disable buffering and allow long-lived connections.
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - host: atw-dashboard.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: atw-dashboard
                port:
                  name: http
  # tls:
  #   - hosts:
  #       - atw-dashboard.example.com
  #     secretName: atw-dashboard-tls

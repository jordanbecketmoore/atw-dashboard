apiVersion: v1
kind: Service
metadata:
  name: atw-dashboard
  labels:
    app.kubernetes.io/name: atw-dashboard
  {{- if .Values.dashboard.service.annotations }}
  annotations:
    {{- range $key, $value := .Values.dashboard.service.annotations }}
    {{ $key }}: {{ $value }}
    {{- end }}
  {{- end }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: atw-dashboard
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP

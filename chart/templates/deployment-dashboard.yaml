apiVersion: apps/v1
kind: Deployment
metadata:
  name: atw-dashboard
  labels:
    app.kubernetes.io/name: atw-dashboard
spec:
  # Hub state is in-memory and warrior connections are stateful — do not scale > 1.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: atw-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atw-dashboard
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: server
          image: {{ .Values.dashboard.image.repository }}:{{ .Values.dashboard.image.tag }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          # livenessProbe:
          #   httpGet:
          #     path: /healthz
          #     port: http
          #   initialDelaySeconds: 5
          #   periodSeconds: 30
          # readinessProbe:
          #   httpGet:
          #     path: /healthz
          #     port: http
          #   initialDelaySeconds: 2
          #   periodSeconds: 10
          # resources:
          #   requests:
          #     cpu: 50m
          #     memory: 64Mi
          #   limits:
          #     cpu: 500m
          #     memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/atw-dashboard
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: atw-dashboard

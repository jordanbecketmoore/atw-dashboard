{{- if .Values.dashboard.deployment.waitForWarriors }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: atw-dashboard-pod-reader
  labels:
    app.kubernetes.io/name: atw-dashboard
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: atw-dashboard-pod-reader
subjects:
  - kind: ServiceAccount
    name: atw-dashboard
    namespace: {{ .Release.Namespace }}
{{- end }}

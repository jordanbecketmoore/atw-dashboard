warriors:
  # Operator nickname reported to the legacy-api.arpa.li leaderboard and
  # passed to each warrior as DOWNLOADER.
  nickname: "your-username"

  # Each entry creates a StatefulSet running the given ArchiveTeam warrior
  # project, plus a headless-style Service per replica that the dashboard
  # connects to. 
  projects:
    - name: usgovernment
      replicas: 1
      # Optional: set CONCURRENT_ITEMS for this project
      # concurrent_items: 6

  service:
    # Extra annotations applied to every per-warrior Service.
    annotations: {}

dashboard:
  image:
    repository: "jordanbmoore/atw-dashboard"
    tag: "v0.1.0"

  # When true, an init container blocks the dashboard pod until every warrior
  # StatefulSet's pods are Ready. Requires RBAC resources (ServiceAccount,
  # Role, RoleBinding) which are also gated on this flag.
  waitForWarriors: true
  waitImage:
    repository: bitnami/kubectl
    tag: latest

  service:
    # Extra annotations applied to the dashboard Service.
    annotations: {}

  httproute:
    # Set true to expose the dashboard via a Gateway API HTTPRoute.
    # Requires a Gateway controller (e.g. Cilium, Envoy Gateway) in the cluster.
    enabled: false
    # Hostnames the route matches. Leave empty to match any host on the parent.
    hostnames: []
    #   - dashboard.example.com
    # Gateways this route attaches to.
    parentRefs: []
    #   - name: my-gateway
    #     namespace: gateway-system

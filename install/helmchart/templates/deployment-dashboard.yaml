apiVersion: apps/v1
kind: Deployment
metadata:
  name: atw-dashboard
  labels:
    app.kubernetes.io/name: atw-dashboard
  annotations:
    {{- range .Values.dashboard.annotations }}
    {{ .key }}: {{ .value | quote }}
    {{- end }}
spec:
  # Hub state is in-memory and warrior connections are stateful — do not scale > 1.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: atw-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: atw-dashboard
    spec:
      {{- if .Values.dashboard.deployment.waitForWarriors }}
      serviceAccountName: atw-dashboard
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      {{- if .Values.dashboard.deployment.waitForWarriors }}
      initContainers:
        - name: wait-for-warriors
          image: {{ .Values.dashboard.deployment.waitImage.repository }}:{{ .Values.dashboard.deployment.waitImage.tag }}
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: WARRIOR_PROJECTS
              value: "{{ range .Values.warriors.projects }}{{ .name }} {{ end }}"
          command:
            - /bin/sh
            - -c
            - |
              for project in $WARRIOR_PROJECTS; do
                echo "Waiting for ${project}-warrior pods to exist..."
                until kubectl get pods -l app=${project}-warrior -n "$NAMESPACE" --no-headers 2>/dev/null | grep -q .; do
                  sleep 5
                done
                echo "Waiting for ${project}-warrior pods to be ready..."
                kubectl wait pods -l app=${project}-warrior -n "$NAMESPACE" --for=condition=Ready --timeout=300s
              done
      {{- end }}
      containers:
        - name: server
          image: {{ .Values.dashboard.deployment.image.repository }}:{{ .Values.dashboard.deployment.image.tag }}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          # livenessProbe:
          #   httpGet:
          #     path: /healthz
          #     port: http
          #   initialDelaySeconds: 5
          #   periodSeconds: 30
          # readinessProbe:
          #   httpGet:
          #     path: /healthz
          #     port: http
          #   initialDelaySeconds: 2
          #   periodSeconds: 10
          # resources:
          #   requests:
          #     cpu: 50m
          #     memory: 64Mi
          #   limits:
          #     cpu: 500m
          #     memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/atw-dashboard
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: atw-dashboard

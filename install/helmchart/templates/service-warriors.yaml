{{- range $project := .Values.warriors.projects }}
{{- range $i, $e := until (int $project.replicas) }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $project.name }}-warrior-{{ $i }}
  labels:
    app.kubernetes.io/name: {{ $project.name }}-warrior-{{ $i }}
  {{- if $.Values.warriors.service.annotations }}
  annotations:
    {{- range $key, $value := $.Values.warriors.service.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  {{- end }}
spec:
  type: ClusterIP
  selector:
    statefulset.kubernetes.io/pod-name: {{ $project.name }}-warrior-{{ $i }}
  ports:
    - name: http
      port: 8001
      targetPort: 8001
      protocol: TCP
{{- end }}
{{- end }}
